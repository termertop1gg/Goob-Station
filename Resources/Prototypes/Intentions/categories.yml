# Notes:
# - The category ids, names, and descriptions follow the requirements table.
# - `priority`, `quotaByGameMode`, and `maxPrimaryPerMindByGameMode`
#   below are starter placeholders and should be tuned for the server.
# - `nameLoc` / `descriptionLoc` keys are prepared for a matching FTL file.

# Личные:
# Намерения, основанные на внутренних переживаниях, настроении, привычках или личных целях персонажа.
- type: scenarioCategory
  id: personal
  nameLoc: intentions-category-personal-name
  descriptionLoc: intentions-category-personal-description
  enabled: true
  icon:
    sprite: /Textures/Interface/Intentions/category_icons.rsi
    state: personal
  color: "#4A90E2"
  priority: 100
  quotaByGameMode:
    default:
      mode: fixed
      value: 20
  maxPrimaryPerMindByGameMode:
    default: 2

