- type: scenarioTemplate
  id: IntentionsTestSocialGreetingRelay
  name: Test social greeting relay
  category: IntentionsTestSocial
  enabled: true
  weight: 1
  globalPredicates:
  - scope: round
    field: crewCount
    operator: ">="
    value: "2"
  entries:
  - slotId: owner
    kind: primary
    intentionId: IntentionsTestSocialPrimary
    required: true
    textParameterBindings:
      ownerName:
        source: self
        field: characterName
      stationName:
        source: round
        field: stationName
  - slotId: partner
    kind: secondary
    intentionId: IntentionsTestSocialGreetingRelayPartner
    required: true
    candidatePredicates:
    - scope: candidate
      field: age
      operator: ">="
      value: "18"
    textParameterBindings:
      partnerName:
        source: self
        field: characterName
      ownerName:
        source: slot
        slotId: owner
        field: characterName
      stationName:
        source: round
        field: stationName
  - slotId: ownerEcho
    kind: secondary
    intentionId: IntentionsTestSocialWitness
    required: true
    bindToSlot: owner
    textParameterBindings:
      partnerName:
        source: self
        field: characterName
      ownerName:
        source: slot
        slotId: owner
        field: characterName
      stationName:
        source: round
        field: stationName
  - slotId: observer
    kind: secondary
    intentionId: IntentionsTestSocialWitness
    required: false
    allowSameActorAs: [owner, partner]
    candidatePredicates:
    - scope: candidate
      field: age
      operator: ">="
      value: "18"
    - scope: candidate
      field: department
      operator: sameAs
      compareTo:
        scope: slot
        slotId: owner
        field: department
    textParameterBindings:
      partnerName:
        source: self
        field: characterName
      ownerName:
        source: slot
        slotId: owner
        field: characterName
      stationName:
        source: round
        field: stationName
      note:
        source: literal
        value: social-observer

