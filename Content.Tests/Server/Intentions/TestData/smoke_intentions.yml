- type: scenarioTemplate
  id: IntentionsSmokeHappyPath
  name: Smoke happy path with optional slot
  category: IntentionsSmokeSocial
  enabled: false
  weight: 1
  globalPredicates:
  - scope: round
    field: crewCount
    operator: ">="
    value: "1"
  entries:
  - slotId: owner
    kind: primary
    intentionId: IntentionsSmokePrimaryCoordinate
    required: true
    textParameterBindings:
      ownerName:
        source: self
        field: characterName
      stationName:
        source: round
        field: stationName
      note:
        source: literal
        value: smoke-happy-path
  - slotId: helper
    kind: secondary
    intentionId: IntentionsSmokeSecondaryAssist
    required: true
    textParameterBindings:
      helperName:
        source: self
        field: characterName
      stationName:
        source: round
        field: stationName
  - slotId: optionalObserver
    kind: secondary
    intentionId: IntentionsSmokeSecondaryAssist
    required: false
    candidatePredicates:
    - scope: candidate
      field: department
      operator: sameAs
      compareTo:
        scope: slot
        slotId: owner
        field: department
    textParameterBindings:
      helperName:
        source: self
        field: characterName
      stationName:
        source: round
        field: stationName

- type: scenarioTemplate
  id: IntentionsSmokeSameActor
  name: Smoke same actor scenario
  category: IntentionsSmokeSocial
  enabled: false
  weight: 1
  entries:
  - slotId: owner
    kind: primary
    intentionId: IntentionsSmokePrimaryCoordinate
    required: true
    textParameterBindings:
      ownerName:
        source: self
        field: characterName
      stationName:
        source: round
        field: stationName
  - slotId: echo
    kind: secondary
    intentionId: IntentionsSmokeSecondaryAssist
    required: true
    allowSameActorAs: [owner]
    textParameterBindings:
      helperName:
        source: self
        field: characterName
      ownerName:
        source: slot
        slotId: owner
        field: characterName
      stationName:
        source: round
        field: stationName

- type: scenarioTemplate
  id: IntentionsSmokeHiddenTimer
  name: Smoke hidden timer scenario
  category: IntentionsSmokeSocial
  enabled: false
  weight: 1
  entries:
  - slotId: owner
    kind: primary
    intentionId: IntentionsSmokePrimaryCoordinate
    required: true
    textParameterBindings:
      ownerName:
        source: self
        field: characterName
      stationName:
        source: round
        field: stationName
  - slotId: hiddenHelper
    kind: secondary
    intentionId: IntentionsSmokeSecondaryHiddenTimer
    required: true
    visibilityOverride:
      type: hidden
      reveal:
        type: timer
        minutes: 5
    textParameterBindings:
      helperName:
        source: self
        field: characterName
      ownerName:
        source: slot
        slotId: owner
        field: characterName
      stationName:
        source: round
        field: stationName
